name: Daily Progress Log

on:
  schedule:
    - cron: "30 3 * * *" # 09:00 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run daily log script
        run: node daily-log.js

      - name: Commit and push changes
        run: |
          git config user.name "Dutta2005"
          git config user.email "duttabipul927@gmail.com"

          git add DAILY_LOG.md
          git diff --cached --quiet || git commit -m "chore: daily progress update"
          git push
